name: Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'docs/**'
      - '.github/workflows/deploy-site.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync site to docs
        run: |
          if [ -f "site/index.html" ]; then
            echo "Copying site/index.html to docs/index.html..."
            mkdir -p docs
            cp site/index.html docs/index.html
            echo "Site index copied successfully"
          else
            echo "site/index.html not found, skipping copy"
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure git
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add docs/index.html
          git commit -m "chore: sync site to docs [automated]"
          git push origin main
