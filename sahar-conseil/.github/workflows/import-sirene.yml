name: Import SIRENE

on:
  workflow_dispatch:
    inputs:
      departements:
        description: 'Départements (ex: 33 75 69) — vide = tous'
        required: false
        default: ''
      force_download:
        description: 'Re-télécharger le fichier SIRENE'
        type: boolean
        default: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas supabase tqdm

      - name: Run SIRENE import
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd sahar-conseil
          ARGS=""
          if [ -n "${{ github.event.inputs.departements }}" ]; then
            ARGS="--dept ${{ github.event.inputs.departements }}"
          fi
          if [ "${{ github.event.inputs.force_download }}" = "true" ]; then
            ARGS="$ARGS --force-download"
          fi
          python data/import_sirene.py $ARGS
