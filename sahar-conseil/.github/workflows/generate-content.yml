name: Generate Content

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC
  workflow_dispatch:
    inputs:
      dept_number:
        description: 'Department number for manual run'
        required: false
        type: string
      article_type:
        description: 'Article type for manual run'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r content_factory/requirements.txt
          pip install requests pandas numpy

      - name: Generate blog content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GA4_MEASUREMENT_ID: G-XV2P0YPJK0
          GA4_API_SECRET: ${{ secrets.GA4_API_SECRET }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ github.event.inputs.dept_number }}" && -n "${{ github.event.inputs.article_type }}" ]]; then
              echo "Running manual content generation with dept_number=${{ github.event.inputs.dept_number }} and article_type=${{ github.event.inputs.article_type }}"
              python content_factory/run_pipeline.py --dept "${{ github.event.inputs.dept_number }}" --type "${{ github.event.inputs.article_type }}"
            else
              echo "Running manual content generation with all articles"
              python scripts/generate_blog.py --all
            fi
          else
            echo "Running scheduled content generation"
            python scripts/generate_blog.py --all
          fi

      - name: Copy generated blog files to docs
        run: |
          if [ -d "site/blog" ]; then
            mkdir -p docs/blog
            cp -r site/blog/* docs/blog/ 2>/dev/null || true
            echo "Blog files copied to docs/blog"
          fi

      - name: Update sitemap.xml
        run: |
          if [ -f "docs/blog" ] || [ -d "docs/blog" ]; then
            echo "Updating sitemap with new blog articles..."
            python -c "
import os
import xml.etree.ElementTree as ET
from datetime import datetime

# Generate sitemap entries for blog articles
sitemap_path = 'docs/sitemap.xml'
blog_dir = 'docs/blog'

if not os.path.exists(sitemap_path):
    # Create new sitemap
    root = ET.Element('urlset')
    root.set('xmlns', 'http://www.sitemaps.org/schemas/sitemap/0.9')
else:
    tree = ET.parse(sitemap_path)
    root = tree.getroot()

# Add/update blog entries
if os.path.isdir(blog_dir):
    for file in os.listdir(blog_dir):
        if file.endswith('.html'):
            article_url = f'https://sahar-conseil.fr/blog/{file}'
            # Check if URL already exists
            existing = False
            for url_elem in root.findall('{http://www.sitemaps.org/schemas/sitemap/0.9}url'):
                loc = url_elem.find('{http://www.sitemaps.org/schemas/sitemap/0.9}loc')
                if loc is not None and loc.text == article_url:
                    existing = True
                    break

            if not existing:
                url_elem = ET.SubElement(root, 'url')
                loc = ET.SubElement(url_elem, 'loc')
                loc.text = article_url
                lastmod = ET.SubElement(url_elem, 'lastmod')
                lastmod.text = datetime.now().strftime('%Y-%m-%d')

# Write sitemap
tree = ET.ElementTree(root)
ET.indent(tree, space='  ')
tree.write(sitemap_path, encoding='utf-8', xml_declaration=True)
print('Sitemap updated successfully')
            "
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure git
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "chore: generate blog content [automated]"
          git push origin main
