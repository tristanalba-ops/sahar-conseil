  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
    :root{--green:#00DC82;--green-dim:#00b86a;--bg:#0f1117;--bg2:#1a1f2e;--bg3:#252b3b;--border:#2d3748;--text:#e2e8f0;--muted:#64748b}
    .hide{display:none!important}
    /* LOGIN */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1117 0%,#1a1f2e 100%)}
    .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:420px}
    .login-logo{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem}
    .login-logo .badge{width:44px;height:44px;background:linear-gradient(135deg,var(--green),var(--green-dim));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.25rem;color:#fff}
    .login-logo h1{font-size:1.1rem;font-weight:600;color:#fff}
    .login-logo span{font-size:.8rem;color:var(--muted)}
    .form-group{margin-bottom:1.2rem}
    .form-group label{display:block;font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
    .form-groug input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--text);font-size:.95rem;transition:.2s}
    .form-group input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(0,220,130,.1)}
    .btn-primary{width:100%;background:var(--green);color:#000;font-weight:600;font-size:.95rem;padding:.8rem;border-radius:8px;border:none;cursor:pointer;transition:.2s}
    .btn-primary:hover{background:var(--green-dim)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .alert-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:8px;padding:.75rem 1rem;font-size:.875rem;margin-bottom:1rem}
    /* ADMIN LAYOUT */
    .admin-nav{background:#070b14;border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
    .nav-brand{display:flex;align-items:center;gap:.75rem}
    .nav-badge{width:36px;height:36px;background:linear-gradient(135deg,var(--green),var(--green-dim));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:1rem}
    .nav-title{font-weight:700;font-size:1rem;color:#fff}
    .nav-sub{font-size:.75rem;color:var(--muted)}
    .nav-user{display:flex;align-items:center;gap:1rem}
    .nav-email{font-size:.8rem;color:var(--muted)}
    .btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.4rem .9rem;border-radius:6px;cursor:pointer;font-size:.8rem;transition:.2s}
    .btn-logout:hover{border-color:var(--green);color:var(--green)}
    .admin-body{max-width:1200px;margin:0 auto;padding:2rem}
    /* TABS */
    .tabs{display:flex;gap:.25rem;border-bottom:1px solid var(--border);margin-bottom:2rem}
    .tab{display:flex;align-items:center;gap:.5rem;padding:.75rem 1.25rem;font-size:.9rem;font-weight:500;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s}
    .tab:hover{color:var(--text)}
    .tab.active{color:var(--green);border-bottom-color:var(--green)}
    /* CARDS */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem}
    .card-title{font-size:1rem;font-weight:600;color:#fff;margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem}
    /* GRID */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
    /* SELECT */
    select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.65rem .9rem;color:var(--text);font-size:.9rem;width:100%;font-family:'Inter',sans-serif}

    .field-label{font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:.4rem;display:block}
    .field-group{margin-bottom:1rem}
    /* BUTTONS */

    .btn-green{background:var(--green);color:#000}
    .btn-green:hover{background:var(--green-dim)}
    .btn-green:disabled{opacity:.5;cursor:not-allowed}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
    .btn-outline:hover{border-color:var(--green);color:var(--green)}
    .btn-sm{padding:.4rem .8rem;font-size:.8rem}

    .badge-status{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .65rem;border-radius:99px;font-size:.75rem;font-weight:500}
    .badge-green{background:rgba(0,220,130,.15);color:var(--green)}
    .badge-yellow{background:rgba(234,179,8,.15);color:#eab308}
    .badge-red{background:rgba(239,68,68,.15);color:#f87171}
    .badge-blue{background:rgba(59,130,246,.15);color:#60a5fa}
    /* KPI */
    .kpi-val{font-size:2rem;font-weight:700;color:#fff}
    .kpi-label{font-size:.8rem;color:var(--muted);margin-top:.25rem}
    .kpi-trend{font-size:.8rem;margin-top:.4rem}
    .trend-up{color:var(--green)}
    .trend-down{color:#f87171}
    /* GENERATOR */
    .gen-layout{display:grid;grid-template-columns:340px 1fr;gap:1.5rem;align-items:start}
    .preview-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:1.25rem;min-height:400px}
    .preview-title{font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
    .preview-content{font-size:.85rem;line-height:1.7;color:var(--text)}
    .preview-content h1,.preview-content h2,.preview-content h3{color:#fff;margin:.75rem 0 .4rem}
    .preview-content p{margin-bottom:.75rem}
    .preview-content ul{margin:.5rem 0 .75rem 1.25rem}
    .seo-bar{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem}
    .seo-score{display:flex;align-items:center;gap:1rem}
    .seo-number{font-size:2.5rem;font-weight:700}
    .seo-good{color:var(--green)}
    .seo-mid{color:#eab308}
    .seo-bad{color:#f87171}
    .seo-bar-track{flex:1;background:var(--border);border-radius:99px;height:8px}
    .seo-bar-fill{height:8px;border-radius:99px;transition:width .5s}
    .seo-items{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.75rem}
    .seo-item{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:.3rem}
    .seo-item.ok::before{content:'✓';color:var(--green)}
    .seo-item.warn::before{content:'⚠';color:#eab308}
    /* TABLE */
    table{width:100%;border-collapse:collapse}
    th{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:.65rem .75rem;border-bottom:1px solid var(--border);text-align:left}
    td{padding:.75rem;font-size:.875rem;border-bottom:1px solid rgba(45,55,72,.5)}
    tr:hover td{background:rgba(255,255,255,.02)}
    /* LOADER */
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(0,220,130,.3);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .generating-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:1rem;color:var(--muted)}
    .generating-overlay .spinner{width:36px;height:36px;border-width:3px}
    /* TAGS */
    .tag{display:inline-block;background:rgba(0,220,130,.1);color:var(--green);border-radius:4px;padding:.1rem .5rem;font-size:.75rem;margin:.1rem}
    /* PROGRESS */
    .progress-row{display:flex;align-items:center;gap:.75rem;padding:.65rem 0;border-bottom:1px solid rgba(45,55,72,.3)}
    .progress-label{flex:1;font-size:.85rem}
    .progress-track{width:120px;background:var(--border);border-radius:99px;height:6px}
    .progress-fill{height:6px;background:var(--green);border-radius:99px}
    @media(max-width:900px){.gen-layout{grid-template-columns:1fr}.grid-3{grid-template-columns:1fr 1fr}.grid-4{grid-template-columns:1fr 1fr}}
    @media(max-width:600px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.admin-body{padding:1rem}}
  </style>
</head>

<script type="text/babel">

/* ─── COMPOSANTS UTILITAIRES ─────────────────────────────────── */
function SEOScore({ score }) {
  const cls = score >= 80 ? 'seo-good' : score >= 60 ? 'seo-mid' : 'seo-bad';
  const fillColor = score >= 80 ? '#00DC82' : score >= 60 ? '#eab308' : '#f87171';
  const checks = [
    { label: 'Balise title optimisée', ok: score >= 40 },
    { label: 'Meta description présente', ok: score >= 50 },
    { label: 'Mot-clé dans H1', ok: score >= 55 },
    { label: 'Structure H2/H3', ok: score >= 65 },
    { label: 'Longueur contenu', ok: score >= 70 },
    { label: 'Liens internes', ok: score >= 80 },
    { label: 'Schema markup', ok: score >= 90 },
    { label: 'Score global ≥80', ok: score >= 80 },
  ];
  return (
    <div className="seo-bar">
      <div className="seo-score">
        <span className={`seo-number ${cls}`}>{score}</span>
        <div style={{flex:1}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'.75rem',color:'var(--muted)',marginBottom:'.4rem'}}>
            <span>Score SEO</span><span>/100</span>
          </div>
          <div className="seo-bar-track">
            <div className="seo-bar-fill" style={{width:`${score}%`,background:fillColor}} />
          </div>
        </div>
      </div>
      <div className="seo-items" style={{marginTop:'.75rem'}}>
        {checks.map(c => (
          <div key={c.label} className={`seo-item ${c.ok ? 'ok' : 'warn'}`}>{c.label}</div>
        ))}
      </div>
    </div>
  );
}

/* ─── MOCK GENERATION ─────────────────────────────────────────── */
async function generateContent(thematique, type, context) {
  // Tentative Edge Function, fallback sur mock enrichi
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch(`${SUPA_URL}/functions/v1/generate-content`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session?.access_token || SUPA_ANON}`,
      },
      body: JSON.stringify({ thematique: thematique.id, type: type.id, context }),
    });
    if (res.ok) {
      const data = await res.json();
      return data;
    }
  } catch (e) { /* fallback */ }

  // ─── MOCK enrichi par thématique ───
  await new Promise(r => setTimeout(r, 2200));
  const now = new Date().toLocaleDateString('fr-FR');
  const slug = `${thematique.id}-${type.id}`;
  const title = `${thematique.label} : Guide complet ${new Date().getFullYear()}`;

  const mockHtml = `<h1>${title}</h1>
<p><strong>Date de publication :</strong> ${now} | <strong>Lecture :</strong> 7 min | <strong>Sources :</strong> ADEME, DVF, INSEE</p>

<h2>Introduction</h2>
<p>Dans un contexte où les données publiques françaises sont de plus en plus accessibles, comprendre <strong>${thematique.label.toLowerCase()}</strong> est devenu un avantage décisif pour les professionnels de l'immobilier et du retail.</p>
<p>Ce guide vous explique comment exploiter les sources officielles — DVF, ADEME, INSEE — pour prendre des décisions éclairées, avec une méthode transparente et des exemples concrets.</p>

<h2>1. Les données disponibles</h2>
<p>La France dispose d'un écosystème open data remarquable :</p>
<ul>
  <li><strong>DVF (Demande de Valeur Foncière)</strong> — Toutes les transactions immobilières depuis 2018</li>
  <li><strong>ADEME DPE</strong> — 8 millions de diagnostics énergétiques</li>
  <li><strong>INSEE</strong> — Données démographiques, économiques et commerciales</li>
  <li><strong>OpenStreetMap</strong> — Points d'intérêt et mobilités</li>
</ul>

<h2>2. Méthodologie d'analyse</h2>
<p>SAHAR Conseil applique un scoring multi-facteur sur 4 axes :</p>
<ul>
  <li>🏠 <strong>Adresse &amp; localisation</strong> (35%) — accessibilité, dynamisme de la zone</li>
  <li>⚡ <strong>Performance énergétique</strong> (25%) — DPE, GES, travaux estimés</li>
  <li>🔧 <strong>État du bien</strong> (20%) — ancienneté, typologies</li>
  <li>📈 <strong>Marché local</strong> (20%) — volumes DVF, tendances, liquidité</li>
</ul>

<h2>3. Cas d'usage concret</h2>
<p>Prenons l'exemple d'un investisseur souhaitant acheter un appartement à Paris 75013 :</p>
<p>En croisant les données DVF des 12 derniers mois avec les DPE ADEME, il est possible d'identifier que les biens classés D-E se négocient en moyenne <strong>12% en dessous des prix de marché</strong>, offrant une marge de négociation liée aux travaux obligatoires 2025.</p>

<h2>4. Outils et ressources</h2>
<p>Pour aller plus loin, SAHAR Conseil propose un simulateur d'estimation basé sur ces données, disponible sur demande. Le rapport généré inclut systématiquement les sources, la méthode de scoring et les intervalles de confiance.</p>

<h2>Conclusion</h2>
<p>Maítriser l'open data immobilier n'est plus réservé aux data scientists. Avec la bonne méthode et les bons outils, n'importe quel professionnel peut exploiter ces données pour réduire son risque et améliorer ses décisions.</p>`;

  const seoScore = 72 + Math.floor(Math.random() * 18);

  return {
    html: mockHtml,
    meta: {
      title,
      slug,
      description: `Découvrez comment ${thematique.label.toLowerCase()} grâce aux données publiques DVF, ADEME et INSEE. Guide complet avec méthode transparente et exemples concrets.`,
      tags: [thematique.id, type.id, 'open-data', 'immobilier', 'dvf', 'dpe'],
      reading_time: type.id === 'guide' ? 12 : 7,
      word_count: type.id === 'guide' ? 2400 : 1050,
    },
    seo_score: seoScore,
    source: 'mock',
  };
}

/* ─── TAB: GÉNÉRATEUR ─────────────────────────────────────────── */
function ContentGenerator() {
  const [thematique, setThematique] = useState(THEMATIQUES[0]);
  const [typeContenu, setTypeContenu] = useState(TYPES_CONTENU[0]);
  const [context, setContext] = useState('');
  const [state, setState] = useState('idle'); // idle | generating | done | publishing | published
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');

  async function handleGenerate() {
    setState('generating');
    setError('');
    setResult(null);
    try {
      const data = await generateContent(thematique, typeContenu, context);
      setResult(data);
      setState('done');
    } catch (e) {
      setError(e.message);
      setState('idle');
    }
  }

  async function handlePublish() {
    if (!result) return;
    setState('publishing');
    try {
      const { data: { session } } = await sb.auth.getSession();
      const { error: err } = await sb.from('articles').insert([{
        keyword: result.meta?.title,
        slug: result.meta?.slug,
        html_content: result.html,
        meta_title: result.meta?.title,
        meta_description: result.meta?.description,
        reading_time: result.meta?.reading_time,
        tags: result.meta?.tags || [],
        status: 'published',
        published_at: new Date().toISOString(),
        created_by: session?.user?.id,
        seo_score: result.seo_score,
      }]);
      if (err) throw err;
      setState('published');
    } catch (e) {
      setError('Erreur publication : ' + e.message);
      setState('done');
    }
  }

  return (
    <div>
      <div className="gen-layout">
        {/* Panneau gauche — Paramètres */}
        <div>
          <div className="card" style={{marginBottom:'1rem'}}>
            <div className="card-title">⚙️ Paramètres</div>

            <div className="field-group">
              <label className="field-label">Thématique</label>
              <select value={thematique.id} onChange={e => setThematique(THEMATIQUES.find(t=>t.id===e.target.value))}>
                {['P0','P1','P2'].map(p => (
                  <optgroup key={p} label={`Priorité ${p}`}>
                    {THEMATIQUES.filter(t=>t.priority===p).map(t => (
                      <option key={t.id} value={t.id}>{t.icon} {t.label}</option>
                    ))}
                  </optgroup>
                ))}
              </select>
            </div>

            <div className="field-group">
              <label className="field-label">Type de contenu</label>
              {TYPES_CONTENU.map(t => (
                <label key={t.id} style={{display:'flex',alignItems:'center',gap:'.6rem',padding:'.5rem .6rem',borderRadius:'6px',cursor:'pointer',background: typeContenu.id===t.id ? 'rgba(0,220,130,.08)' : 'transparent',border: typeContenu.id===t.id ? '1px solid rgba(0,220,130,.3)' : '1px solid transparent',marginBottom:'.3rem'}}>
                  <input type="radio" name="type" checked={typeContenu.id===t.id} onChange={() => setTypeContenu(t)} style={{accentColor:'var(--green)'}} />
                  <span style={{fontSize:'.9rem'}}>{t.icon} {t.label}</span>
                  <span style={{fontSize:'.75rem',color:'var(--muted)',marginLeft:'auto'}}>{t.desc}</span>
                </label>
              ))}
            </div>

            <div className="field-group">
              <label className="field-label">Contexte additionnel (optionnel)</label>
              <textarea value={context} onChange={e=>setContext(e.target.value)} placeholder="Ex: Cibler les investisseurs Île-de-France, focus travaux DPE post-2025..." rows={3} />
            </div>

            {error && <div className="alert-err">{error}</div>}

            <button className="btn btn-green" style={{width:'100%'}} onClick={handleGenerate} disabled={state==='generating'||state==='publishing'}>
              {state==='generating' ? <><span className="spinner" style={{marginRight:'.5rem'}}></span>Génération en cours...</> : '🚀 Générer l\'article'}
            </button>
          </div>

          {/* Infos thématique sélectionnée */}
          <div className="card">
            <div className="card-title" style={{fontSize:'.9rem'}}>📋 Thématique choisie</div>
            <div style={{display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'.75rem'}}>
              <span style={{fontSize:'2rem'}}>{thematique.icon}</span>
              <div>
                <div style={{fontWeight:600,color:'#fff',fontSize:'.95rem'}}>{thematique.label}</div>
                <span className={`badge-status ${PRIORITY_COLORS[thematique.priority]}`}>{thematique.priority}</span>
              </div>
            </div>
            <div style={{fontSize:'.8rem',color:'var(--muted)'}}>Sources: DVF · ADEME · INSEE · OpenStreetMap</div>
          </div>
        </div>

        {/* Panneau droit — Résultat */}
        <div>
          {result && (
            <>
              <SEOScore score={result.seo_score} />
              <div style={{display:'flex',gap:'.75rem',marginBottom:'.75rem',flexWrap:'wrap'}}>
                {state === 'published' ? (
                  <span className="badge-status badge-green" style={{fontSize:'.85rem',padding:'.4rem .9rem'}}>✓ Publié avec succès</span>
                ) : (
                  <button className="btn btn-green" onClick={handlePublish} disabled={state==='publishing'}>
                    {state==='publishing' ? <><span className="spinner"></span> Publication...</> : '📤 Publier l\'article'}
                  </button>
                )}
                <button className="btn btn-outline" onClick={() => { setResult(null); setState('idle'); }}>
                  🔄 Réinitialiser
                </button>
                {result.source === 'mock' && <span className="badge-status badge-yellow" style={{fontSize:'.75rem'}}>⚠ Mode démo (Edge Function non déployée)</span>}
              </div>
            </>
          )}

          <div className="preview-box">
            {state === 'generating' ? (
              <div className="generating-overlay">
                <div className="spinner"></div>
                <div style={{fontWeight:600,color:'var(--text)'}}>Génération en cours...</div>
                <div style={{fontSize:'.85rem'}}>Analyse thématique · Structuration SEO · Rédaction</div>
                <div style={{fontSize:'.8rem',color:'var(--muted)',marginTop:'.5rem'}}>~2-5 secondes</div>
              </div>
            ) : result ? (
              <>
                <div className="preview-title">APERÇU ARTICLE</div>
                <div className="preview-content" dangerouslySetInnerHTML={{ __html: result.html }} />
                <div style={{marginTop:'1rem',paddingTop:'.75rem',borderTop:'1px solid var(--border)'}}>
                  <div style={{fontSize:'.75rem',color:'var(--muted)',marginBottom:'.4rem'}}>Tags générés :</div>
                  {(result.meta?.tags || []).map(t => <span key={t} className="tag">{t}</span>)}
                </div>
              </>
            ) : (
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'320px',color:'var(--muted)',gap:'.75rem'}}>
                <span style={{fontSize:'3rem'}}>✍️</span>
                <div style={{fontWeight:600,fontSize:'1.1rem',color:'var(--text)'}}>Prêt à générer</div>
                <div style={{fontSize:'.85rem',textAlign:'center',maxWidth:'280px'}}>Sélectionne une thématique, un type de contenu et clique sur "Générer l'article"</div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── TAB: PLANIFICATEUR ─────────────────────────────────────── */
function BatchScheduler() {
  const [articles, setArticles] = useState([]);
  const [loading, setLoading] = useState(true);
  const [batchStatus, setBatchStatus] = useState(null);
  const [running, setRunning] = useState(false);

  useEffect(() => { loadArticles(); }, []);

  async function loadArticles() {
    setLoading(true);
    const { data } = await sb.from('articles').select('*').order('created_at', { ascending: false }).limit(20);
    setArticles(data || []);
    setLoading(false);
  }

  // Simulation d'une génération batch (5 articles en séquence)
  async function runBatch() {
    setRunning(true);
    setBatchStatus({ total: 5, done: 0, current: null });
    const queue = THEMATIQUES.filter(t => t.priority === 'P0' || t.priority === 'P1').slice(0, 5);
    for (let i = 0; i < queue.length; i++) {
      const t = queue[i];
      setBatchStatus({ total: 5, done: i, current: t.label });
      const result = await generateContent(t, TYPES_CONTENU[0], '');
      await sb.from('articles').insert([{
        keyword: result.meta?.title,
        slug: result.meta?.slug + '-' + Date.now(),
        html_content: result.html,
        meta_title: result.meta?.title,
        meta_description: result.meta?.description,
        reading_time: result.meta?.reading_time,
        tags: result.meta?.tags || [],
        status: 'draft',
        seo_score: result.seo_score,
        created_at: new Date().toISOString(),
      }]);
    }
    setBatchStatus({ total: 5, done: 5, current: null });
    setRunning(false);
    loadArticles();
  }

  const fmtDate = iso => iso ? new Date(iso).toLocaleDateString('fr-FR') : '—';
  const statusBadge = s => {
    if (s === 'published') return <span className="badge-status badge-green">● Publié</span>;
    if (s === 'draft') return <span className="badge-status badge-yellow">● Brouillon</span>;
    return <span className="badge-status badge-blue">● En attente</span>;
  };

  return (
    <div>
      {/* Batch Controls */}
      <div className="card" style={{marginBottom:'1.5rem'}}>
        <div className="card-title">🔄 Génération batch</div>
        <div className="grid-2" style={{gap:'1rem',alignItems:'start'}}>
          <div>
            <div style={{fontSize:'.9rem',color:'var(--muted)',marginBottom:'1rem'}}>Générer automatiquement les articles des thématiques P0 et P1 (5 articles prioritaires).</div>
            <button className="btn btn-green" onClick={runBatch} disabled={running}>
              {running ? <><span className="spinner"></span> Batch en cours...</> : '⚡ Lancer batch P0+P1 (5 articles)'}
            </button>
          </div>
          {batchStatus && (
            <div>
              <div style={{fontSize:'.85rem',color:'var(--muted)',marginBottom:'.5rem'}}>
                Progression: {batchStatus.done}/{batchStatus.total}
                {batchStatus.current && <span> — {batchStatus.current}</span>}
              </div>
              {THEMATIQUES.filter(t=>t.priority==='P0'||t.priority==='P1').slice(0,5).map((t,i) => (
                <div key={t.id} className="progress-row">
                  <span style={{fontSize:'1rem'}}>{t.icon}</span>
                  <span className="progress-label" style={{fontSize:'.8rem'}}>{t.label}</span>
                  <div className="progress-track">
                    <div className="progress-fill" style={{width: i < batchStatus.done ? '100%' : i === batchStatus.done && running ? '60%' : '0%'}} />
                  </div>
                  <span style={{fontSize:'.75rem',width:'45px',textAlign:'right',color: i < batchStatus.done ? 'var(--green)' : 'var(--muted)'}}>
                    {i < batchStatus.done ? '✓ OK' : i === batchStatus.done && running ? '...' : 'En attente'}
                  </span>
                </div>
              ))}
              {batchStatus.done === 5 && <div style={{color:'var(--green)',fontSize:'.875rem',marginTop:'.5rem',fontWeight:600}}>✓ Batch terminé — {batchStatus.done} articles en brouillon</div>}
            </div>
          )}
        </div>
      </div>

      {/* Articles table */}
      <div className="card">
        <div className="card-title" style={{justifyContent:'space-between'}}>
          📄 Articles ({articles.length})
          <button className="btn btn-outline btn-sm" onClick={loadArticles}>↻ Actualiser</button>
        </div>
        {loading ? (
          <div style={{display:'flex',justifyContent:'center',padding:'2rem'}}><div className="spinner" style={{width:28,height:28,borderWidth:3}}></div></div>
        ) : articles.length === 0 ? (
          <div style={{textAlign:'center',color:'var(--muted)',padding:'2rem'}}>Aucun article — génère ton premier article dans l'onglet Générateur</div>
        ) : (
          <div style={{overflowX:'auto'}}>
            <table>
              <thead>
                <tr>
                  <th>Titre</th>
                  <th>Statut</th>
                  <th>SEO</th>
                  <th>Lecture</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody>
                {articles.map(a => (
                  <tr key={a.id}>
                    <td>
                      <div style={{fontWeight:500,color:'#fff',maxWidth:'300px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.keyword || a.meta_title || '—'}</div>
                      <div style={{fontSize:'.75rem',color:'var(--muted)'}}>{a.slug}</div>
                    </td>
                    <td>{statusBadge(a.status)}</td>
                    <td>
                      {a.seo_score ? (
                        <span style={{color: a.seo_score >= 80 ? 'var(--green)' : a.seo_score >= 60 ? '#eab308' : '#f87171',fontWeight:600}}>
                          {a.seo_score}
                        </span>
                      ) : '—'}
                    </td>
                    <td style={{color:'var(--muted)'}}>{a.reading_time ? `${a.reading_time} min` : '—'}</td>
                    <td style={{color:'var(--muted)',fontSize:'.8rem'}}>{fmtDate(a.created_at)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── TAB: ANALYTICS ──────────────────────────────────────────── */
function AnalyticsDashboard() {
  const [stats, setStats] = useState({ total: 0, published: 0, draft: 0, avg_seo: 0 });
  const [loading, setLoading] = useState(true);
  const [byPriority, setByPriority] = useState({P0:0,P1:0,P2:0});

  useEffect(() => {
    async function load() {
      const { data } = await sb.from('articles').select('status,seo_score,tags');
      if (!data) return setLoading(false);
      const total = data.length;
      const published = data.filter(a=>a.status==='published').length;
      const draft = data.filter(a=>a.status==='draft').length;
      const scores = data.filter(a=>a.seo_score).map(a=>a.seo_score);
      const avg_seo = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
      setStats({ total, published, draft, avg_seo });
      setLoading(false);
    }
    load();
  }, []);

  const contentPlan = THEMATIQUES.map(t => ({
    ...t,
    types: TYPES_CONTENU.map(tc => ({ ...tc, done: Math.random() > .7 })),
  }));

  return (
    <div>
      {/* KPIs */}
      <div className="grid-4" style={{marginBottom:'1.5rem'}}>
        {[
          { val: stats.total, label: 'Articles créés', trend: '+3 cette semaine', up: true },
          { val: stats.published, label: 'Articles publiés', trend: `${Math.round(stats.published/Math.max(stats.total,1)*100)}% du total`, up: true },
          { val: stats.draft, label: 'Brouillons', trend: 'à publier', up: false },
          { val: stats.avg_seo || '—', label: 'Score SEO moyen', trend: stats.avg_seo >= 75 ? 'Bon' : 'À améliorer', up: (stats.avg_seo||0) >= 75 },
        ].map(k => (
          <div key={k.label} className="card">
            <div className="kpi-val">{loading ? '...' : k.val}</div>
            <div className="kpi-label">{k.label}</div>
            <div className={`kpi-trend ${k.up ? 'trend-up' : ''}`}>{k.trend}</div>
          </div>
        ))}
      </div>

      {/* Plan de contenu 15×5 */}
      <div className="card">
        <div className="card-title">📊 Plan de contenu — 15 thématiques × 5 formats (75 articles)</div>
        <div style={{overflowX:'auto'}}>
          <table>
            <thead>
              <tr>
                <th style={{minWidth:'200px'}}>Thématique</th>
                <th>Prio</th>
                {TYPES_CONTENU.map(t => <th key={t.id}>{t.icon} {t.label}</th>)}
                <th>Avancement</th>
              </tr>
            </thead>
            <tbody>
              {contentPlan.map(t => {
                const done = t.types.filter(tc=>tc.done).length;
                return (
                  <tr key={t.id}>
                    <td><span style={{marginRight:'.4rem'}}>{t.icon}</span>{t.label}</td>
                    <td><span className={`badge-status ${PRIORITY_COLORS[t.priority]}`}>{t.priority}</span></td>
                    {t.types.map(tc => (
                      <td key={tc.id} style={{textAlign:'center'}}>
                        {tc.done
                          ? <span style={{color:'var(--green)',fontSize:'1.1rem'}}>✓</span>
                          : <span style={{color:'var(--border)',fontSize:'1.1rem'}}>○</span>}
                      </td>
                    ))}
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
                        <div className="progress-track" style={{width:'60px'}}>
                          <div className="progress-fill" style={{width:`${done/5*100}%`}} />
                        </div>
                        <span style={{fontSize:'.75rem',color:'var(--muted)'}}>{done}/5</span>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{marginTop:'1rem',fontSize:'.8rem',color:'var(--muted)'}}>
          ℹ️ Données illustratives — se synchronisent avec la table articles Supabase
        </div>
      </div>
    </div>
  );
}

/* ─── LOGIN PAGE ──────────────────────────────────────────────── */
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pwd, setPwd] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  async function handleSubmit(e) {
    e.preventDefault();
    setLoading(true);
    setErr('');
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if (error) { setErr(error.message); setLoading(false); return; }
    if (!ADMIN_EMAILS.includes(data.user.email)) {
      await sb.auth.signOut();
      setErr('Accès réservé aux administrateurs SAHAR.');
      setLoading(false);
      return;
    }
    onLogin(data.user);
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <div className="badge">S</div>
          <div>
            <div>SAHAR Conseil</div>
            <span>Content Factory — Admin</span>
          </div>
        </div>
        {err && <div className="alert-err">{err}</div>}
        <form onSubmit={handleSubmit}>
          <div className="form-group">
            <label>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="ton@email.com" required />
          </div>
          <div className="form-group">
            <label>Mot de passe</label>
            <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="••••••••" required />
          </div>
          <button className="btn-primary" type="submit" disabled={loading}>
            {loading ? 'Connexion...' : 'Accéder à la Content Factory →'}
          </button>
        </form>
        <div style={{marginTop:'1.5rem',textAlign:'center',fontSize:'.8rem',color:'var(--muted)'}}>
          Accès restreint · SAHAR Conseil © 2025
        </div>
      </div>
    </div>
  );
}

/* ─── ADMIN APP ───────────────────────────────────────────────── */
const TABS = [
  { id: 'generator', label: 'Générateur', icon: '✍️' },
  { id: 'scheduler', label: 'Planificateur', icon: '📅' },
  { id: 'analytics', label: 'Analytics', icon: '📊' },
];

function AdminApp({ user, onLogout }) {
  const [tab, setTab] = useState('generator');
  return (
    <div>
      <nav className="admin-nav">
        <div className="nav-brand">
          <div className="nav-badge">S</div>
          <div>
            <div className="nav-title">SAHAR Content Factory</div>
            <div className="nav-sub">Génération · Planification · Analytics</div>
          </div>
        </div>
        <div className="nav-user">
          <span className="nav-email">{user.email}</span>
          <button className="btn-logout" onClick={onLogout}>Déconnexion</button>
        </div>
      </nav>
      <div className="admin-body">
        <div className="tabs">
          {TABS.map(t => (
            <button key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
        {tab === 'generator' && <ContentGenerator />}
        {tab === 'scheduler' && <BatchScheduler />}
        {tab === 'analytics' && <AnalyticsDashboard />}
      </div>

  );
}

/* ─── ROOT APP ────────────────────────────────────────────────── */
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user && ADMIN_EMAILS.includes(session.user.email)) {
        setUser(session.user);
      }
      setLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      if (session?.user && ADMIN_EMAILS.includes(session.user.email)) setUser(session.user);
      else setUser(null);
    });
    return () => subscription.unsubscribe();
  }, []);

  async function handleLogout() {
    await sb.auth.signOut();
    setUser(null);
  }

  if (loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div className="spinner" style={{width:40,height:40,borderWidth:4}}></div>
    </div>
  );

  return user ? <AdminApp user={user} onLogout={handleLogout} /> : <LoginPage onLogin={setUser} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
