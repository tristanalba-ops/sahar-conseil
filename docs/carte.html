<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Intent Analytics — Carte</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090e;--s1:#0c0e18;--s2:#10131f;--s3:#161928;--b0:#181b2a;--b1:#1d2133;--b2:#252a3e;
  --a:#4f7cff;--a2:#7c5dfc;--g:#2cd87e;--r:#f54f4f;--y:#f5c43a;--o:#ff7a2f;
  --t:#d8dced;--m:#606882;--f:#101320;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;--head:'Syne',sans-serif;
  --panel:390px;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--sans);background:var(--bg);color:var(--t);font-size:13px}

/* LOCK */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.lcard{width:330px;padding:2.25rem 1.75rem;background:var(--s1);border:1px solid var(--b1);border-radius:18px;text-align:center;box-shadow:0 0 60px rgba(79,124,255,.08)}
.llogo{font-family:var(--head);font-size:1.4rem;font-weight:800;margin-bottom:.2rem}
.llogo em{color:var(--a);font-style:normal}
.lsub{font-size:.75rem;color:var(--m);margin-bottom:1.5rem}
.lcard input{width:100%;padding:.75rem;background:var(--bg);border:1px solid var(--b1);border-radius:9px;color:var(--t);font-family:var(--mono);font-size:.9rem;text-align:center;letter-spacing:4px;outline:none;transition:border-color .2s}
.lcard input:focus{border-color:var(--a)}
.lcard button{width:100%;margin-top:.65rem;padding:.75rem;background:linear-gradient(135deg,var(--a),var(--a2));border:none;border-radius:9px;color:#fff;font-family:var(--head);font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .15s}
.lcard button:hover{opacity:.82}
.lerr{font-size:.7rem;color:var(--r);margin-top:.45rem;min-height:14px}

/* APP */
#app{width:100%;height:100%;display:flex;flex-direction:column}

/* TOPBAR */
#topbar{height:50px;flex-shrink:0;background:rgba(8,9,14,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--b0);display:flex;align-items:center;gap:.7rem;padding:0 .875rem;z-index:400}
.tlogo{font-family:var(--head);font-size:.88rem;font-weight:800;white-space:nowrap;flex-shrink:0}
.tlogo em{color:var(--a);font-style:normal}
#searchWrap{flex:1;max-width:440px;position:relative}
#si{width:100%;padding:.48rem .85rem;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t);font-family:var(--sans);font-size:.8rem;outline:none;transition:border-color .2s}
#si:focus{border-color:rgba(79,124,255,.45)}
#si::placeholder{color:var(--m)}
#sdd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s1);border:1px solid var(--b1);border-radius:9px;z-index:600;max-height:190px;overflow-y:auto;display:none;box-shadow:0 10px 36px rgba(0,0,0,.55)}
.sg{padding:.55rem .85rem;cursor:pointer;font-size:.78rem;border-bottom:1px solid var(--b0);color:var(--t);transition:background .1s;display:flex;align-items:center;gap:5px}
.sg::before{content:'📍';font-size:.68rem;opacity:.5;flex-shrink:0}
.sg:last-child{border-bottom:none}
.sg:hover{background:rgba(79,124,255,.06);color:var(--a)}
#locBtn{padding:.48rem .7rem;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--m);cursor:pointer;font-size:.82rem;flex-shrink:0;transition:all .15s}
#locBtn:hover{border-color:var(--a);color:var(--a)}
.sep{width:1px;height:20px;background:var(--b1);flex-shrink:0}
/* Facette buttons */
.facettes{display:flex;gap:4px;flex-shrink:0}
.fbt{display:flex;align-items:center;gap:4px;padding:.32rem .6rem;border-radius:6px;cursor:pointer;border:1px solid var(--b1);font-family:var(--mono);font-size:.62rem;font-weight:500;transition:all .18s;white-space:nowrap;background:var(--s2);color:var(--m)}
.fbt .fd{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:opacity .2s}
.fbt.off{opacity:.4}
.fbt.on[data-l="transport"]{background:rgba(79,124,255,.1);border-color:rgba(79,124,255,.22);color:var(--a)}
.fbt.on[data-l="transport"] .fd{background:var(--a)}
.fbt.on[data-l="ecoles"]{background:rgba(44,216,126,.09);border-color:rgba(44,216,126,.2);color:var(--g)}
.fbt.on[data-l="ecoles"] .fd{background:var(--g)}
.fbt.on[data-l="sante"]{background:rgba(245,79,79,.08);border-color:rgba(245,79,79,.2);color:var(--r)}
.fbt.on[data-l="sante"] .fd{background:var(--r)}
.fbt.on[data-l="commerces"]{background:rgba(245,196,58,.09);border-color:rgba(245,196,58,.2);color:var(--y)}
.fbt.on[data-l="commerces"] .fd{background:var(--y)}
.fbt.on[data-l="parcelle"]{background:rgba(124,93,252,.09);border-color:rgba(124,93,252,.2);color:var(--a2)}
.fbt.on[data-l="parcelle"] .fd{background:var(--a2);border-radius:2px}
@media(max-width:860px){.facettes{display:none}.sep{display:none}.tlogo{display:none}}

/* MAIN SPLIT */
#main{flex:1;display:flex;overflow:hidden}

/* MAP — toujours visible, jamais caché */
#mapw{flex:1;min-width:0;position:relative}
#map{width:100%;height:100%}
.leaflet-tile{filter:brightness(.7) saturate(.55) hue-rotate(185deg) contrast(1.05)}
.leaflet-control-zoom{border:1px solid var(--b1)!important;background:rgba(9,10,18,.88)!important;border-radius:8px!important;overflow:hidden}
.leaflet-control-zoom a{background:transparent!important;color:var(--t)!important;border-bottom:1px solid var(--b0)!important;width:26px!important;height:26px!important;line-height:26px!important;font-size:.85rem!important}
.leaflet-control-zoom a:last-child{border-bottom:none!important}
.leaflet-control-zoom a:hover{background:rgba(79,124,255,.1)!important}
.leaflet-control-attribution{background:rgba(6,7,11,.75)!important;color:var(--m)!important;font-size:9px!important}
.leaflet-popup-content-wrapper{background:var(--s1)!important;border:1px solid var(--b1)!important;border-radius:9px!important;color:var(--t)!important;box-shadow:0 6px 20px rgba(0,0,0,.5)!important;font-family:var(--sans)!important;font-size:.75rem!important}
.leaflet-popup-tip{background:var(--s1)!important}
.leaflet-popup-content{margin:8px 12px!important}

/* Legend */
#legend{position:absolute;bottom:14px;left:14px;z-index:300;background:rgba(9,10,18,.88);backdrop-filter:blur(10px);border:1px solid var(--b1);border-radius:9px;padding:.5rem .75rem;display:none;flex-direction:column;gap:4px}
#legend.show{display:flex}
.lg-row{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.6rem;color:var(--m)}
.lg-d{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lg-s{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* PANEL */
#panel{width:var(--panel);height:100%;flex-shrink:0;background:var(--s1);border-left:1px solid var(--b0);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:860px){
  #main{flex-direction:column}
  #mapw{height:42vh;flex:none}
  #panel{width:100%;height:58vh;border-left:none;border-top:1px solid var(--b0)}
}
#panel::-webkit-scrollbar{width:0}

/* Empty */
#pEm{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;gap:.5rem}
.em-ico{font-size:2rem;opacity:.18}
.em-h{font-family:var(--head);font-size:.88rem;color:var(--m)}
.em-p{font-size:.72rem;color:var(--m);opacity:.5;line-height:1.65;max-width:210px}

/* Loading */
#pLoad{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:.65rem}
#pLoad.on{display:flex}
.sp{width:22px;height:22px;border:2px solid var(--b2);border-top-color:var(--a);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#pLoad p{font-size:.72rem;color:var(--m)}

/* Body */
#pBody{flex:1;overflow-y:auto;display:none;flex-direction:column;min-height:0}
#pBody.show{display:flex}
#pBody::-webkit-scrollbar{width:3px}
#pBody::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* Panel header */
.ph{background:linear-gradient(160deg,var(--s2) 0%,var(--s1) 100%);padding:.85rem .9rem .75rem;border-bottom:1px solid var(--b0);flex-shrink:0;position:sticky;top:0;z-index:10}
.ph-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.55rem}
.ph-addr{font-family:var(--head);font-size:.85rem;font-weight:700;line-height:1.3;color:var(--t)}
.ph-sub{font-family:var(--mono);font-size:.58rem;color:var(--m);margin-top:.1rem}
.ph-x{background:none;border:none;color:var(--m);cursor:pointer;font-size:.9rem;padding:2px;line-height:1;transition:color .15s;flex-shrink:0;margin-top:1px}
.ph-x:hover{color:var(--t)}
.sc-row{display:flex;align-items:center;gap:.8rem}
.sc-num{font-family:var(--head);font-size:2rem;font-weight:800;line-height:1}
.sc-lab{font-family:var(--mono);font-size:.55rem;color:var(--m);margin-top:1px}
.sc-bars{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:2px 8px}
.sb{display:flex;align-items:center;gap:4px}
.sb-l{font-size:.57rem;color:var(--m);flex:0 0 58px;font-family:var(--mono)}
.sb-b{flex:1;height:2px;background:var(--b1);border-radius:2px;overflow:hidden}
.sb-f{height:2px;border-radius:2px}

/* Panel body content */
.pb{padding:.65rem .875rem 1.5rem}

/* Estim card */
.ec{background:linear-gradient(135deg,rgba(79,124,255,.07),rgba(124,93,252,.04));border:1px solid rgba(79,124,255,.17);border-radius:11px;padding:.8rem;margin-bottom:.7rem;position:relative;overflow:hidden}
.ec::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--a),var(--a2))}
.ec-tag{font-family:var(--mono);font-size:.57rem;letter-spacing:2px;text-transform:uppercase;color:var(--a);margin-bottom:.4rem;display:flex;align-items:center;gap:5px}
.ec-tag::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--a);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.ec-price{font-family:var(--head);font-size:1.75rem;font-weight:800;color:var(--a);line-height:1}
.ec-unit{font-size:.78rem;color:var(--m);font-weight:400}
.ec-line{display:flex;justify-content:space-between;align-items:flex-end;margin-top:.4rem;gap:.65rem;flex-wrap:wrap}
.ec-sub{font-size:.68rem;color:var(--m);line-height:1.5}
.ec-box{background:rgba(79,124,255,.09);border:1px solid rgba(79,124,255,.16);border-radius:7px;padding:.45rem .7rem;text-align:center;flex-shrink:0}
.ec-bval{font-family:var(--head);font-size:1.05rem;font-weight:700}
.ec-blbl{font-family:var(--mono);font-size:.52rem;letter-spacing:1px;text-transform:uppercase;color:var(--m);margin-top:1px}
.ec-meta{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.6rem;padding-top:.55rem;border-top:1px solid rgba(79,124,255,.09)}
.em{font-family:var(--mono);font-size:.57rem;color:var(--m);background:var(--f);border:1px solid var(--b0);border-radius:4px;padding:1px 5px}
.em strong{color:var(--t)}

/* Sections */
.sec{margin-bottom:.55rem}
.sh{display:flex;align-items:center;gap:5px;margin-bottom:.45rem;padding-bottom:.35rem;border-bottom:1px solid var(--b0)}
.stag{font-family:var(--mono);font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;padding:2px 5px;border-radius:3px;flex-shrink:0}
.ta{background:rgba(79,124,255,.09);color:var(--a);border:1px solid rgba(79,124,255,.17)}
.tg{background:rgba(44,216,126,.08);color:var(--g);border:1px solid rgba(44,216,126,.16)}
.tr{background:rgba(245,79,79,.07);color:var(--r);border:1px solid rgba(245,79,79,.16)}
.ty{background:rgba(245,196,58,.08);color:var(--y);border:1px solid rgba(245,196,58,.16)}
.tp{background:rgba(124,93,252,.09);color:var(--a2);border:1px solid rgba(124,93,252,.18)}
.to{background:rgba(255,122,47,.08);color:var(--o);border:1px solid rgba(255,122,47,.16)}
.stitle{font-size:.76rem;font-weight:600}
.si{font-size:.8rem;flex-shrink:0}

/* Cards */
.card{background:var(--s2);border:1px solid var(--b0);border-radius:9px;padding:.65rem}
.card+.card{margin-top:5px}
.kpig{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:5px}
.kpi{background:var(--s2);border:1px solid var(--b0);border-radius:7px;padding:.55rem .65rem;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px}
.kpi.a::before{background:var(--a)}.kpi.g::before{background:var(--g)}.kpi.r::before{background:var(--r)}.kpi.y::before{background:var(--y)}.kpi.p::before{background:var(--a2)}.kpi.o::before{background:var(--o)}
.klbl{font-family:var(--mono);font-size:.55rem;letter-spacing:1.2px;text-transform:uppercase;color:var(--m);margin-bottom:3px}
.kval{font-family:var(--head);font-size:1.02rem;font-weight:700;line-height:1}
.kval.a{color:var(--a)}.kval.g{color:var(--g)}.kval.r{color:var(--r)}.kval.y{color:var(--y)}.kval.p{color:var(--a2)}
.ksub{font-size:.6rem;color:var(--m);margin-top:1px;font-family:var(--mono)}
.dr{display:flex;justify-content:space-between;align-items:baseline;padding:3.5px 0;border-bottom:1px solid rgba(255,255,255,.022);font-size:.73rem}
.dr:last-child{border-bottom:none}
.dl{color:var(--m)}.dv{font-family:var(--mono);font-size:.68rem;font-weight:500;text-align:right;color:var(--t)}
.bb{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.bbl{flex:0 0 76px;font-size:.65rem;color:var(--m)}.bbr{flex:1;height:3px;background:var(--b1);border-radius:2px;overflow:hidden}.bbf{height:3px;border-radius:2px;transition:width .4s .1s ease}
.bbv{flex:0 0 22px;text-align:right;font-family:var(--mono);font-size:.6rem;font-weight:600}
.dpe-stack{display:flex;height:13px;gap:1px;border-radius:2px;overflow:hidden;margin:5px 0}
.ds{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.5rem;font-weight:700;color:#fff}
.dA{background:#1a7a4a}.dB{background:#5a9a2a}.dC{background:#a0c040;color:#111}.dD{background:#e8c020;color:#111}.dE{background:#e88020}.dF{background:#cc3030}.dG{background:#881010}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:var(--f);padding:4px 6px;text-align:left;font-family:var(--mono);font-size:.55rem;letter-spacing:.8px;text-transform:uppercase;color:var(--m);border-bottom:1px solid var(--b0)}
.tbl td{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,.018);font-size:.7rem}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.01)}
.poi-item{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.02);font-size:.72rem}
.poi-item:last-child{border-bottom:none}
.poi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.reno-card{background:linear-gradient(135deg,rgba(255,122,47,.05),rgba(245,196,58,.03));border:1px solid rgba(255,122,47,.16);border-radius:9px;padding:.65rem}
.reno-r{display:flex;justify-content:space-between;align-items:center;padding:3.5px 0;border-bottom:1px solid rgba(255,122,47,.07);font-size:.72rem}
.reno-r:last-child{border-bottom:none}
.risk-item{display:flex;align-items:center;gap:6px;padding:3.5px 0;border-bottom:1px solid rgba(255,255,255,.022);font-size:.72rem}
.risk-item:last-child{border-bottom:none}
.rb{font-family:var(--mono);font-size:.6rem;padding:1px 5px;border-radius:3px;flex-shrink:0}
.rb-y{background:rgba(245,79,79,.1);color:var(--r);border:1px solid rgba(245,79,79,.18)}
.rb-n{background:rgba(44,216,126,.08);color:var(--g);border:1px solid rgba(44,216,126,.14)}
.src-note{font-family:var(--mono);font-size:.56rem;color:var(--m);opacity:.45;margin-top:5px}
.empty-note{color:var(--m);font-size:.7rem}
.share-row{display:flex;gap:5px;margin-top:.7rem;padding-top:.65rem;border-top:1px solid var(--b0)}
.sbtn{flex:1;padding:.5rem;background:var(--f);border:1px solid var(--b0);border-radius:7px;color:var(--m);font-family:var(--sans);font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.sbtn:hover{border-color:var(--a);color:var(--a)}
.sbtn.p{background:linear-gradient(135deg,var(--a),var(--a2));border:none;color:#fff;font-weight:600}
.sbtn.p:hover{opacity:.85}
.src-list{font-family:var(--mono);font-size:.55rem;color:var(--m);opacity:.35;line-height:1.9;margin-top:.65rem;padding-top:.6rem;border-top:1px solid var(--b0)}

#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(12,14,24,.94);border:1px solid var(--b1);border-radius:8px;padding:.45rem 1rem;font-size:.75rem;z-index:9000;opacity:0;transition:opacity .25s;pointer-events:none;backdrop-filter:blur(10px)}
#toast.show{opacity:1}
@media print{#topbar,#mapw,#legend,#pEm,#pLoad,.ph-x,.share-row{display:none!important}#main{flex-direction:column}#panel{width:100%;height:auto;border:none;overflow:visible}}
</style>
</head>
<body>

<div id="lock">
  <div class="lcard">
    <div class="llogo">Intent<em>.Analytics</em></div>
    <div class="lsub">Carte — Usage interne</div>
    <input type="password" id="lpin" placeholder="••••••••" autocomplete="off">
    <button onclick="unlock()">Accéder →</button>
    <div id="lerr" class="lerr"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div id="topbar">
    <div class="tlogo">Intent<em>.Analytics</em></div>
    <div id="searchWrap">
      <input type="text" id="si" placeholder="Rechercher une adresse…" autocomplete="off">
      <div id="sdd"></div>
    </div>
    <button id="locBtn" onclick="locate()" title="Me localiser">📍</button>
    <div class="sep"></div>
    <div class="facettes">
      <div class="fbt on" data-l="transport" onclick="toggleL(this)"><span class="fd"></span>Transports</div>
      <div class="fbt on" data-l="ecoles" onclick="toggleL(this)"><span class="fd"></span>Écoles</div>
      <div class="fbt on" data-l="sante" onclick="toggleL(this)"><span class="fd"></span>Santé</div>
      <div class="fbt on" data-l="commerces" onclick="toggleL(this)"><span class="fd"></span>Commerces</div>
      <div class="fbt on" data-l="parcelle" onclick="toggleL(this)"><span class="fd"></span>Parcelle</div>
    </div>
  </div>

  <div id="main">
    <div id="mapw">
      <div id="map"></div>
      <div id="legend">
        <div class="lg-row"><span class="lg-d" style="background:var(--a)"></span>Transports</div>
        <div class="lg-row"><span class="lg-d" style="background:var(--g)"></span>Écoles</div>
        <div class="lg-row"><span class="lg-d" style="background:var(--r)"></span>Santé</div>
        <div class="lg-row"><span class="lg-d" style="background:var(--y)"></span>Commerces</div>
        <div class="lg-row"><span class="lg-s" style="background:rgba(124,93,252,.4);border:1.5px solid var(--a2)"></span>Parcelle</div>
      </div>
    </div>

    <div id="panel">
      <div id="pEm">
        <div class="em-ico">🗺️</div>
        <div class="em-h">Cliquez sur la carte</div>
        <div class="em-p">ou recherchez une adresse pour afficher le rapport complet</div>
      </div>
      <div id="pLoad"><div class="sp"></div><p>Chargement…</p></div>
      <div id="pBody">
        <div class="ph">
          <div class="ph-top">
            <div><div class="ph-addr" id="phAddr">—</div><div class="ph-sub" id="phSub">—</div></div>
            <button class="ph-x" onclick="closePanel()">✕</button>
          </div>
          <div class="sc-row" id="scRow" style="display:none">
            <div><div class="sc-num" id="scNum">—</div><div class="sc-lab">/100 · localisation</div></div>
            <div class="sc-bars" id="scBars"></div>
          </div>
        </div>

/* MAP */
function initMap(){
  map=L.map('map',{zoomControl:true}).setView([46.5,2.3],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
  for(var k in LG){LG[k]=L.layerGroup().addTo(map);}
  map.on('click',function(e){reverseGeocode(e.latlng.lat,e.latlng.lng);});
  var p=new URLSearchParams(window.location.search);
  if(p.get('lat')&&p.get('lng'))reverseGeocode(+p.get('lat'),+p.get('lng'));
}

function toggleL(btn){
  var l=btn.dataset.l;
  LS[l]=!LS[l];
  btn.classList.toggle('on',LS[l]);
  btn.classList.toggle('off',!LS[l]);

}

function clearLayers(){for(var k in LG)LG[k].clearLayers();}

function poiIcon(color,shape){
  var r=shape==='sq'?'3px':'50%';
  return L.divIcon({className:'',html:'<div style="width:9px;height:9px;background:'+color+';border:2px solid rgba(255,255,255,.35);border-radius:'+r+';box-shadow:0 1px 5px rgba(0,0,0,.4)"></div>',iconSize:[9,9],iconAnchor:[4,4]});
}

function reverseGeocode(lat,lng){
  fetch('https://api-adresse.data.gouv.fr/reverse/?lon='+lng+'&lat='+lat)
    .then(function(r){return r.json();})
    .then(function(res){
      if(res.features&&res.features.length){var p=res.features[0].properties;p.x=lng;p.y=lat;geo=p;loadReport();}
      else toast('Aucune adresse trouvée ici');
    }).catch(function(){toast('Erreur');});
}

function locate(){
  if(!navigator.geolocation)return toast('Non supporté');
  navigator.geolocation.getCurrentPosition(function(p){
    map.setView([p.coords.latitude,p.coords.longitude],17);
    reverseGeocode(p.coords.latitude,p.coords.longitude);
  },function(){toast('Refusé');});
}

/* SEARCH */
var deb;
document.getElementById('si').addEventListener('input',function(){

});
document.addEventListener('click',function(e){if(!e.target.closest('#searchWrap'))document.getElementById('sdd').style.display='none';});

/* LOAD */
function loadReport(){
  if(!geo)return;
  if(addrMark)map.removeLayer(addrMark);
  addrMark=L.marker([geo.y,geo.x],{icon:L.divIcon({className:'',html:'<div style="width:18px;height:18px;background:linear-gradient(135deg,#4f7cff,#7c5dfc);border-radius:50%;border:3px solid rgba(255,255,255,.3);box-shadow:0 2px 14px rgba(79,124,255,.6)"></div>',iconSize:[18,18],iconAnchor:[9,9]})}).addTo(map);
  clearLayers();
  document.getElementById('pEm').style.display='none';
  document.getElementById('pLoad').classList.add('on');
  document.getElementById('pBody').classList.remove('show');
  document.getElementById('scRow').style.display='none';
  document.getElementById('phAddr').textContent=geo.label||'—';
  document.getElementById('phSub').textContent=(geo.postcode||'')+' '+(geo.city||'')+(geo.citycode?' · INSEE '+geo.citycode:'');
  var cc=geo.citycode,cp=geo.postcode,lat=geo.y,lng=geo.x;
  if(!cc)return toast('Commune non identifiée');
  Promise.all([
    sf('address_profile',{code_commune:cc},3),
    sf('score_localisation_commune',{code_commune:cc},1),

    sf('dpe_diagnostics',{code_postal:cp},300),

    sf('data_plu_communes',{code_commune:cc},1),
    sf('data_bdnb_batiments',{code_commune_insee:cc},2),

  ]).then(function(R){

    var d={geo:geo,cc:cc,cp:cp,lat:lat,lng:lng,ap:R[0],sc:R[1][0]||null,dvf:R[2],dpe:R[3],risk:R[4][0]||null,plu:R[5][0]||null,bdnb:R[6],demo:R[7][0]||null,poi:R[8][0]||null,eau:R[9][0]||null,ml:R[10]};
    renderPanel(d);

/* MAP POI via Overpass */
function loadMapPOI(lat,lng){
  var radius=800;
  var cats=[
    {l:'transport',col:'#4f7cff',q:'node[highway=bus_stop];node[railway=station];node[railway=tram_stop];node[amenity=bicycle_rental];node[amenity=parking];'},
    {l:'ecoles',col:'#2cd87e',q:'node[amenity=school];way[amenity=school];node[amenity=kindergarten];node[amenity=college];node[amenity=university];'},
    {l:'sante',col:'#f54f4f',q:'node[amenity=pharmacy];node[amenity=hospital];node[amenity=clinic];node[amenity=doctors];node[amenity=dentist];'},
    {l:'commerces',col:'#f5c43a',q:'node[shop=supermarket];node[shop=bakery];node[shop=butcher];node[amenity=bank];node[amenity=restaurant];node[amenity=cafe];node[amenity=post_office];'}
  ];
  cats.forEach(function(cat){
    var body='[out:json][timeout:12];('+cat.q.split(';').filter(Boolean).map(function(q){return q+'(around:'+radius+','+lat+','+lng+');';}).join('')+');out center 50;';
    fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(body)})
      .then(function(r){return r.ok?r.json():null;})
      .then(function(res){
        if(!res||!res.elements)return;
        res.elements.slice(0,40).forEach(function(el){
          var elat=el.lat||(el.center&&el.center.lat);
          var elng=el.lon||(el.center&&el.center.lon);
          if(!elat||!elng)return;
          var name=(el.tags&&(el.tags.name||el.tags.ref))||'';
          L.marker([elat,elng],{icon:poiIcon(cat.col,'circle')})
            .bindPopup('<span style="color:'+cat.col+';font-weight:600">'+(name||cat.l)+'</span>')
            .addTo(LG[cat.l]);
        });
        document.getElementById('legend').classList.add('show');
      }).catch(function(){});
  });
}

function loadParcel(lat,lng){
  fetch('https://apicarto.ign.fr/api/cadastre/parcelle?lon='+lng+'&lat='+lat+'&_limit=1')
    .then(function(r){return r.ok?r.json():null;})
    .then(function(res){
      if(!res||!res.features||!res.features.length)return;
      if(LS.parcelle){
        L.geoJSON(res.features[0],{style:{color:'#7c5dfc',weight:2.5,fillColor:'rgba(124,93,252,.12)',fillOpacity:.4,dashArray:'5,4'}}).addTo(LG.parcelle);
      }
      document.getElementById('legend').classList.add('show');
    }).catch(function(){});
}

/* RENDER PANEL */
function renderPanel(d){
  renderScore(d);
  var html='';
  html+=renderEstim(d);
  html+=sec('💰','DVF · DGFIP','ty','Transactions notariales',renderDVF(d));
  html+=sec('⚡','DPE · ADEME','tg','Performances énergétiques',renderDPE(d));
  html+=sec('🔧','Rénovation','to','Estimation travaux & aides',renderReno(d));
  html+=sec('📍','POI · BPE INSEE','ta','Équipements à proximité',renderPOI(d));
  html+=sec('🛡️','Géorisques · BRGM','tr','Risques naturels',renderRisk(d));
  html+=sec('💧','Eau · Hub\'Eau','ta','Qualité de l\'eau',renderEau(d));
  html+=sec('🏗️','BDNB · CSTB','ta','Données bâtiment',renderBDNB(d));
  html+=sec('📐','PLU · GPU','tp','Urbanisme',renderPLU(d));
  html+=sec('👥','INSEE · Démo','ta','Socio-économique',renderDemo(d));
  html+=sec('🔬','address_profile','tp','Profil enrichi IA',renderAP(d));
  html+='<div id="asyncSecs"></div>';
  html+='<div class="share-row"><button class="sbtn" onclick="copyLink()">🔗 Lien</button><button class="sbtn p" onclick="printReport()">⬇ PDF</button></div>';
  html+='<div class="src-list">DVF · ADEME · Géorisques · Hub\'Eau · BAN · IGN · INSEE · BPE · BDNB · GPU · WAQI · Open-Meteo · Education Nationale · geo.api.gouv · OSM/Overpass</div>';
  document.getElementById('pb').innerHTML=html;
  loadAsync(d);
}

function renderScore(d){
  var s=d.sc;if(!s)return;
  var sc=Math.round(s.score_localisation||0);
  var col=sc>=60?'var(--g)':sc>=35?'var(--y)':'var(--r)';
  document.getElementById('scNum').textContent=sc;
  document.getElementById('scNum').style.color=col;
  document.getElementById('scRow').style.display='flex';
  var dims=[{l:'Accès',v:s.score_accessibilite||0},{l:'Sécu.',v:s.score_securite||0},{l:'Services',v:s.score_services||0},{l:'Risques',v:100-(s.score_risques_naturels||0)},{l:'Dynam.',v:s.score_dynamisme||0}];
  document.getElementById('scBars').innerHTML=dims.map(function(x){
    var c=x.v>=60?'var(--g)':x.v>=35?'var(--y)':'var(--r)';
    return'<div class="sb"><div class="sb-l">'+x.l+'</div><div class="sb-b"><div class="sb-f" style="width:'+x.v+'%;background:'+c+'"></div></div></div>';
  }).join('');
}

function renderEstim(d){
  var ap=d.ap[0]||null;
  var dvfP=d.dvf.filter(function(r){return r.surface_reelle_bati>=9&&r.valeur_fonciere>=5000;}).map(function(r){return r.valeur_fonciere/r.surface_reelle_bati;}).filter(function(v){return v>500&&v<50000;}).sort(function(a,b){return a-b;});
  var pz=ap&&ap.dvf_prix_m2_median?ap.dvf_prix_m2_median:(dvfP.length?dvfP[Math.floor(dvfP.length/2)]:(d.ml[0]&&d.ml[0].prix_zone_median||3000));
  setTimeout(function(){
    rpc('predict_hedonic_prix_m2',{p_type_local:'Appartement',p_surface:75,p_prix_zone:Math.round(pz),p_revenu_commune:d.demo&&d.demo.revenu_median_uc?d.demo.revenu_median_uc:(d.ml[0]&&d.ml[0].revenu_median_commune||null),p_score_transport:d.sc&&d.sc.score_accessibilite?d.sc.score_accessibilite:(d.poi&&d.poi.score_transport||null),p_annee_vente:2024}).then(function(res){
      var el=document.getElementById('estimInner');if(!el)return;
      if(!res||!res.prix_m2_estime){el.innerHTML='<span class="empty-note">Estimation non disponible</span>';return;}
      var pm=res.prix_m2_estime,bas=res.prix_m2_bas,haut=res.prix_m2_haut,tot=res.prix_total_estime;
      el.innerHTML='<div class="ec-tag">HEDONIC v1 · Appt. 75m² type</div>'
        +'<div class="ec-line"><div><div class="ec-price">'+fmt(pm)+'<span class="ec-unit"> /m²</span></div>'
        +'<div class="ec-sub" style="margin-top:.25rem">'+d.geo.city+'<br>'+fmt(bas)+' — '+fmt(haut)+' /m²</div></div>'
        +'<div class="ec-box"><div class="ec-bval">'+fmt(tot)+'</div><div class="ec-blbl">Total</div></div></div>'
        +'<div class="ec-meta"><div class="em">Zone <strong>'+fmt(Math.round(pz))+'/m²</strong></div><div class="em">MAPE <strong>~25%</strong></div><div class="em">R² <strong>0.77</strong></div><div class="em" style="font-style:italic">Indicatif</div></div>';
    });
  },80);
  return'<div class="sec"><div class="sh"><span class="si">💡</span><span class="stag ta">Estimation · IA</span><span class="stitle">Modèle hédonique v1</span></div>'
    +'<div class="ec"><div id="estimInner"><div style="display:flex;align-items:center;gap:7px;color:var(--m);font-size:.7rem"><div class="sp" style="width:14px;height:14px;border-width:1.5px"></div>Calcul…</div></div></div></div>';
}

function renderDVF(d){
  var f=d.dvf.filter(function(r){return r.surface_reelle_bati>=9&&r.valeur_fonciere>=5000;});
  var p=f.map(function(r){return r.valeur_fonciere/r.surface_reelle_bati;}).filter(function(v){return v>500&&v<50000;}).sort(function(a,b){return a-b;});
  var med=p.length?p[Math.floor(p.length/2)]:0,moy=p.length?p.reduce(function(a,b){return a+b;})/p.length:0;
  var html='<div class="kpig">'+kpi('y','Médiane €/m²',med?fmt(med):'—',p.length+' obs.')+kpi('','Transactions',fmtN(d.dvf.length),'')+'</div>';
  html+='<div class="card" style="overflow:auto;max-height:190px"><table class="tbl"><thead><tr><th>Date</th><th>Type</th><th>Surf.</th><th>€/m²</th></tr></thead><tbody>';
  html+=f.slice(0,12).map(function(r){var pm=r.valeur_fonciere/r.surface_reelle_bati;var cl=pm<med*.85?'color:var(--r)':pm>med*1.15?'color:var(--g)':'';return'<tr><td style="font-family:var(--mono);font-size:.62rem">'+(r.date_mutation&&r.date_mutation.substring(0,7)||'—')+'</td><td>'+(r.type_local||'—')+'</td><td style="font-family:var(--mono);font-size:.62rem">'+fmtN(r.surface_reelle_bati)+'m²</td><td style="font-family:var(--mono);font-size:.67rem;font-weight:600;'+cl+'">'+fmt(pm)+'</td></tr>';}).join('');
  html+='</tbody></table></div>';
  return html;
}

function renderDPE(d){
  if(!d.dpe.length)return'<div class="card"><span class="empty-note">Aucun diagnostic</span></div>';
  var cnt={A:0,B:0,C:0,D:0,E:0,F:0,G:0};
  d.dpe.forEach(function(r){if(r.classe_energie&&cnt.hasOwnProperty(r.classe_energie))cnt[r.classe_energie]++;});
  var tot=Object.values(cnt).reduce(function(a,b){return a+b;},0)||1;
  var mod=Object.entries(cnt).sort(function(a,b){return b[1]-a[1];})[0][0];
  var pFG=((cnt.F+cnt.G)/tot*100).toFixed(1),pABC=((cnt.A+cnt.B+cnt.C)/tot*100).toFixed(1);
  var html='<div class="kpig">'+kpi('y','Classe modale',mod,tot+' bilans')+kpi(parseFloat(pFG)>15?'r':'g','Part F-G',pFG+'%','passoires')+'</div>';
  html+='<div class="card"><div class="dpe-stack">'+['A','B','C','D','E','F','G'].map(function(c){return cnt[c]?'<div class="ds d'+c+'" style="flex:'+cnt[c]+'">'+(cnt[c]/tot>.1?c:'')+'</div>':'';}).join('')+'</div>';
  html+=(parseFloat(pFG)>15?'<div style="color:var(--r);font-size:.68rem;margin-top:4px">⚠ '+pFG+'% passoires · impact -5% à -20%</div>':'<div style="color:var(--g);font-size:.68rem;margin-top:4px">✓ Parc performant · '+pABC+'% A-B-C</div>')+'</div>';
  return html;
}

function renderReno(d){
  var ap=d.ap[0]||null;
  var dvfP=d.dvf.map(function(r){return r.valeur_fonciere/r.surface_reelle_bati;}).filter(function(v){return v>500&&v<50000;}).sort(function(a,b){return a-b;});
  var pz=ap&&ap.dvf_prix_m2_median?ap.dvf_prix_m2_median:(dvfP.length?dvfP[Math.floor(dvfP.length/2)]:null);
  if(!pz)return'<div class="card"><span class="empty-note">Données insuffisantes</span></div>';
  var surf=75,cout=surf*575,aides=surf*250,reste=cout-aides,pv=Math.round(pz*surf*0.17);
  return'<div class="reno-card">'
    +'<div style="font-family:var(--mono);font-size:.57rem;color:var(--o);letter-spacing:1px;text-transform:uppercase;margin-bottom:.4rem">Simulation passoire → C · 75m²</div>'
    +'<div class="reno-r"><span style="color:var(--m)">Coût travaux</span><span style="font-family:var(--mono);font-weight:600">'+fmt(cout)+'</span></div>'
    +'<div class="reno-r"><span style="color:var(--m)">Aides MaPrimeRénov + CEE</span><span style="font-family:var(--mono);color:var(--g)">− '+fmt(aides)+'</span></div>'
    +'<div class="reno-r"><span style="color:var(--m)">Reste à charge</span><span style="font-family:var(--mono);font-weight:700">'+fmt(reste)+'</span></div>'
    +'<div class="reno-r" style="border-top:1px solid rgba(255,122,47,.12);margin-top:3px;padding-top:3px"><span style="color:var(--m)">Plus-value estimée</span><span style="font-family:var(--mono);color:var(--y)">+ '+fmt(pv)+'</span></div>'
    +'</div>';
}

function renderPOI(d){
  var poi=d.poi;
  if(!poi)return'<div class="card"><span class="empty-note">Absent</span></div>';
  return'<div class="card">'+bb('Transport',poi.score_transport||0)+bb('Éducation',poi.score_education||0)+bb('Santé',poi.score_sante||0)+bb('Commerce',poi.score_commerce||0)+bb('Loisirs',poi.score_loisirs||0)+'<div class="src-note">'+fmtN(poi.nb_equipements||0)+' équipements · BPE INSEE · affichés sur la carte →</div></div>';
}

function renderRisk(d){
  var r=d.risk;
  if(!r)return'<div class="card"><span class="empty-note">Absent</span></div>';
  function ri(l,v){return'<div class="risk-item"><span class="rb '+(v?'rb-y':'rb-n')+'">'+(v?'Oui':'Non')+'</span><span>'+l+'</span></div>';}
  return'<div class="card">'+ri('Inondation (PPRI)',r.risque_inondation)+ri('Argile retrait-gonflement',r.risque_argile)+ri('PPRN prescrit',r.pprn_prescrit)+ri('PPRT industriel',r.pprt_prescrit)+dr('Sismicité',['—','Zone 1','Zone 2','Zone 3','Zone 4','Zone 5'][r.risque_seisme||0]||'—')+dr('Arrêtés Cat-Nat',r.nb_catnat||0)+'<div class="src-note">Géorisques · BRGM</div></div>';
}

function renderEau(d){
  var e=d.eau;
  if(!e)return'<div class="card"><span class="empty-note">Absent</span></div>';
  return'<div class="card">'+dr('Conformité globale',e.taux_conformite_global!=null?Number(e.taux_conformite_global).toFixed(1)+'%':'—')+dr('Nitrates',e.nitrates_mg_l!=null?Number(e.nitrates_mg_l).toFixed(1)+' mg/L':'—')+dr('Bactériologie',e.conformite_bacterio?'✓ Conforme':'⚠ Non conforme')+dr('Pesticides',e.pesticides_detectes?'⚠ Détectés':'✓ Non détectés')+'<div class="src-note">Hub\'Eau · EauFrance</div></div>';
}

function renderBDNB(d){
  if(!d.bdnb.length)return'<div class="card"><span class="empty-note">Couverture partielle</span></div>';
  var b=d.bdnb[0];
  return'<div class="card">'+dr('Année construction',b.annee_construction||'—')+dr('Hauteur',b.hauteur_mean?Number(b.hauteur_mean).toFixed(1)+'m':'—')+dr('Nb logements',b.nb_log||'—')+dr('Matériaux mur',b.mat_mur_txt||'—')+dr('Classe DPE bât.',b.classe_bilan_dpe||'—')+'<div class="src-note">BDNB · CSTB</div></div>';
}

function renderPLU(d){
  var p=d.plu;
  if(!p)return'<div class="card"><span class="empty-note">PLU non numérisé</span></div>';
  return'<div class="card">'+dr('Zone dominante',p.zone_dominante||'—')+dr('Zone U',p.pct_zone_u?p.pct_zone_u+'%':'—')+dr('Zone AU',p.pct_zone_au?p.pct_zone_au+'%':'—')+dr('Zone N',p.pct_zone_n?p.pct_zone_n+'%':'—')+dr('Date approbation',p.date_approbation||'—')+'<div class="src-note">Géoportail Urbanisme</div></div>';
}

function renderDemo(d){
  var dm=d.demo;
  if(!dm)return'<div class="card"><span class="empty-note">Absent</span></div>';
  return'<div class="kpig">'+kpi('y','Population',fmtN(dm.population_2024||dm.population_2020||0),'hab.')+kpi('','Revenu médian',dm.revenu_median_uc?fmt(dm.revenu_median_uc):'—','/UC')+'</div>'
    +'<div class="card">'+dr('Taux chômage',dm.taux_chomage?dm.taux_chomage+'%':'—')+dr('Part propriétaires',dm.part_proprietaires?dm.part_proprietaires+'%':'—')+dr('Taux pauvreté',dm.taux_pauvrete?dm.taux_pauvrete+'%':'—')+'<div class="src-note">INSEE RP 2020</div></div>';
}

function renderAP(d){
  var ap=d.ap[0]||null;
  if(!ap)return'<div class="card"><span class="empty-note">Non disponible</span></div>';
  return'<div class="kpig">'+kpi('y','Prix/m² adresse',ap.dvf_prix_m2_median?fmt(ap.dvf_prix_m2_median):'—','DVF')+kpi('g','DPE modal',ap.dpe_etiquette_modale||'—','')+'</div>'
    +'<div class="card">'+dr('Prix P25',ap.dvf_prix_m2_p25?fmt(ap.dvf_prix_m2_p25):'—')+dr('Prix P75',ap.dvf_prix_m2_p75?fmt(ap.dvf_prix_m2_p75):'—')+dr('Tendance 1 an',ap.dvf_prix_m2_trend_1y!=null?(ap.dvf_prix_m2_trend_1y>0?'+':'')+Number(ap.dvf_prix_m2_trend_1y*100).toFixed(1)+'%':'—')+dr('Mutations DVF',ap.dvf_nb_mutations||'—')+'</div>';
}

/* ASYNC */
function loadAsync(d){loadAir(d);loadClimat(d);loadCommune(d);loadScolaire(d);}

function addAsyncSec(html){
  var el=document.getElementById('asyncSecs');
  if(el)el.innerHTML+=html;
}

function loadAir(d){
  fetch('https://api.waqi.info/feed/geo:'+d.lat+';'+d.lng+'/?token=demo')
    .then(function(r){return r.json();})
    .then(function(res){
      if(res.status!=='ok'||!res.data)return;
      var aqi=res.data.aqi,iaqi=res.data.iaqi||{};
      var col=aqi<=50?'var(--g)':aqi<=100?'var(--y)':aqi<=150?'var(--o)':'var(--r)';
      var qual=aqi<=50?'Bon':aqi<=100?'Modéré':aqi<=150?'Mauvais groupes sens.':'Mauvais';
      var html='<div class="kpig">'+kpi('','IQA','<span style="color:'+col+'">'+aqi+'</span>',qual)+(iaqi.pm25?kpi('','PM2.5',iaqi.pm25.v+' µg/m³',''):'')+'</div>';
      if(iaqi.pm10||iaqi.no2)html+='<div class="card">'+(iaqi.pm10?dr('PM10',iaqi.pm10.v+' µg/m³'):'')+(iaqi.no2?dr('NO₂',iaqi.no2.v+' µg/m³'):'')+(iaqi.o3?dr('O₃',iaqi.o3.v+' µg/m³'):'')+'<div class="src-note">WAQI · temps réel</div></div>';
      addAsyncSec(sec('🌬️','Qualité air · WAQI','ta','Indice en temps réel',html));
    }).catch(function(){});
}

function loadClimat(d){
  fetch('https://api.open-meteo.com/v1/forecast?latitude='+d.lat+'&longitude='+d.lng+'&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,sunshine_duration&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=Europe/Paris&forecast_days=3')
    .then(function(r){return r.json();})
    .then(function(res){
      var cur=res.current||{},daily=res.daily||{};
      var wc=cur.weather_code||0,wd=wc===0?'☀ Dégagé':wc<=3?'⛅ Nuageux':wc<=49?'🌫 Brouillard':wc<=69?'🌧 Pluie':wc<=79?'🌨 Neige':'⛈ Orage';
      var sunH=daily.sunshine_duration?Math.round(daily.sunshine_duration[0]/3600):null;
      var html='<div class="kpig">'+kpi('y','Température',cur.temperature_2m!=null?Math.round(cur.temperature_2m)+'°C':'—','actuelle')+kpi('','Ensoleil.',sunH!=null?sunH+'h':'—','aujourd\'hui')+'</div>';
      html+='<div class="card">'+dr('Conditions',wd)+(daily.temperature_2m_max?dr('Min / Max',Math.round(daily.temperature_2m_min[0])+'° / '+Math.round(daily.temperature_2m_max[0])+'°'):'')+(daily.precipitation_sum?dr('Précip.',daily.precipitation_sum[0]>0?daily.precipitation_sum[0].toFixed(1)+' mm':'Aucune'):'')+'<div class="src-note">Open-Meteo · temps réel</div></div>';
      addAsyncSec(sec('☀️','Climat · Open-Meteo','ty','Météo & ensoleillement',html));
    }).catch(function(){});
}

function loadCommune(d){
  fetch('https://geo.api.gouv.fr/communes/'+d.cc+'?fields=nom,code,codeDepartement,codeRegion,codeEpci,population,surface')
    .then(function(r){return r.json();})
    .then(function(res){
      if(!res)return;
      var html='<div class="card">'+dr('Nom',res.nom||'—')+dr('INSEE',res.code||'—')+dr('Département',res.codeDepartement||'—')+dr('Région',res.codeRegion||'—')+dr('EPCI',res.codeEpci||'—')+dr('Population',res.population?fmtN(res.population)+' hab.':'—')+dr('Surface',res.surface?fmtN(Math.round(res.surface))+' ha':'—')+'<div class="src-note">geo.api.gouv.fr</div></div>';
      addAsyncSec(sec('🏛️','Commune','ta','Données administratives',html));
    }).catch(function(){});
}

function loadScolaire(d){
  fetch('https://data.education.gouv.fr/api/explore/v2.1/catalog/datasets/fr-en-annuaire-education/records?where=within_distance(position%2Cgeom\'POINT('+d.lng+' '+d.lat+')\'%2C1km)&limit=8&select=nom_etablissement%2Ctype_etablissement%2Cstatut_public_prive%2Clatitude%2Clongitude')
    .then(function(r){return r.ok?r.json():null;})
    .then(function(res){
      if(!res||!res.results||!res.results.length)return;
      res.results.forEach(function(e){if(e.latitude&&e.longitude)L.marker([e.latitude,e.longitude],{icon:poiIcon('#2cd87e','circle')}).bindPopup('<b style="color:#2cd87e">'+e.nom_etablissement+'</b>').addTo(LG.ecoles);});
      var byT={};res.results.forEach(function(e){var t=e.type_etablissement||'Autre';if(!byT[t])byT[t]=[];byT[t].push(e);});
      var html='<div class="card"><div class="src-note" style="margin-bottom:5px">'+res.total_count+' établissements dans 1km</div>';
      Object.keys(byT).forEach(function(t){
        html+='<div style="font-family:var(--mono);font-size:.58rem;color:var(--g);margin:.35rem 0 .2rem;letter-spacing:.8px;text-transform:uppercase">'+t+'</div>';
        byT[t].slice(0,3).forEach(function(e){html+='<div class="poi-item"><span class="poi-dot" style="background:var(--g)"></span><span>'+e.nom_etablissement+'</span><span style="color:var(--m);font-size:.62rem;margin-left:auto">'+(e.statut_public_prive||'')+'</span></div>';});
      });
      html+='<div class="src-note">Annuaire Éducation Nationale</div></div>';
      addAsyncSec(sec('🏫','Carte scolaire · MEN','tg','Établissements à proximité',html));
    }).catch(function(){});
}

/* ACTIONS */
function closePanel(){document.getElementById('pBody').classList.remove('show');document.getElementById('pEm').style.display='';}
function copyLink(){if(!geo){toast('Chargez une adresse');return;}navigator.clipboard.writeText(window.location.href).then(function(){toast('Lien copié ✓');}).catch(function(){toast('Erreur');});}
function printReport(){toast('Impression…');setTimeout(function(){window.print();},300);}
